services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: trazabilidad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d trazabilidad"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm=localhost:8222"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # GPU passthrough (uncomment for NVIDIA GPU support):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      OLLAMA_HOST: http://ollama:11434

  api:
    build: .
    command: ["api"]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://app:secret@postgres:5432/trazabilidad?sslmode=disable
      NATS_URL: nats://nats:4222
      OLLAMA_HOST: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
      MIGRATIONS_PATH: /app/migrations
      API_PORT: "8080"
      # LLM_API_KEY: sk-ant-your-key-here
      # LLM_BASE_URL: https://api.anthropic.com
      # LLM_MODEL: claude-sonnet-4-20250514
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build: .
    command: ["worker"]
    environment:
      DATABASE_URL: postgresql://app:secret@postgres:5432/trazabilidad?sslmode=disable
      NATS_URL: nats://nats:4222
      OLLAMA_HOST: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  nats_data:
  ollama_data:
